[pytest]
# Directorio raíz para encontrar módulos locales (pages, config, utils)
pythonpath = .

# Dónde buscar los archivos de tests
testpaths = features/steps

# Patrón de archivos de test
python_files = *_steps.py

# Opciones por defecto:
#   -v          → verbose: muestra nombre de cada test
#   --tb=short  → traceback corto en fallos
addopts = -v --tb=short

# Markers disponibles para organizar y filtrar tests
markers =
    smoke: Pruebas rápidas de humo (críticas)
    regression: Suite completa de regresión
    search: Pruebas relacionadas con la búsqueda
